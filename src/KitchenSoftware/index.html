<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Dashboard</title>
  <link rel="stylesheet" href="./kitchen.css">
</head>
<body>
  <div class="header">
    <h1 id="headerTitle">Kitchen Dashboard</h1>
    <div class="header-actions">
      <button type="button" class="profile-icon-btn" id="openProfileBtn" title="Моят профил" aria-label="Моят профил">
        <span class="profile-icon">👤</span>
        <span id="kitchenUserName" class="user-name">Loading...</span>
      </button>
    </div>
  </div>

  <!-- Kitchen Profile Modal (same design as Manager) -->
  <div id="kitchenProfileModal" class="modal" style="display: none;" aria-hidden="true">
    <div class="modal-overlay" data-close-kitchen-profile></div>
    <div class="modal-card modal-profile-card">
      <div class="modal-head">
        <b>Моят профил</b>
        <button type="button" class="modal-close" data-close-kitchen-profile aria-label="Затвори">✕</button>
      </div>
      <div class="modal-body">
        <div class="profile-info-card">
          <div class="profile-avatar">👤</div>
          <div class="profile-details">
            <div class="profile-row">
              <span class="profile-label">Име</span>
              <span id="kitchenProfileName" class="profile-value">—</span>
            </div>
            <div class="profile-row">
              <span class="profile-label">Имейл</span>
              <span id="kitchenProfileEmail" class="profile-value">—</span>
            </div>
            <div class="profile-row">
              <span class="profile-label">Роля</span>
              <span id="kitchenProfileRole" class="profile-value">Кухня</span>
            </div>
          </div>
        </div>
        <p class="profile-hint" id="kitchenProfileHint">Кухненското табло показва активните поръчки.</p>
        <div class="profile-actions">
          <button type="button" class="btn btn-secondary" id="modalLangBtn">EN</button>
          <button type="button" class="btn btn-secondary" id="modalExitBtn">Изход</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="orders" id="tabOrders" type="button">
      Orders <span class="badge" id="ordersBadge">0</span>
    </button>
    <button class="tab" data-tab="metrics" id="tabMetrics" type="button">Metrics</button>
  </div>

  <div class="main-container">
    <div class="orders-section" id="ordersSection">
      <div id="kitchenQueue"></div>
    </div>

    <div class="sidebar">
      <div class="metrics-card" id="metricsCard">
        <h3 class="card-title" id="metricsTitle">Average cooking time</h3>

        <div class="metric">
          <div class="metric-label" id="avgTimeLabel">Ready/Served today</div>
          <div class="metric-value large" id="avgTime">00:00</div>
        </div>

        <div class="metric">
          <div class="metric-label" id="lateOrdersLabel">Late items</div>
          <div class="metric-value" id="lateOrders">0</div>
        </div>

        <div class="metric">
          <div class="metric-label" id="totalOrdersLabel">Total orders today</div>
          <div class="metric-value" id="totalOrders">0</div>
        </div>
      </div>

      <div class="takeaway-card">
        <h3 class="card-title" id="takeawayTitle">Station status</h3>
        <div id="takeawayOrders">
          <div class="takeaway-order">
            <div class="takeaway-header">
              <span class="takeaway-number" id="newLabel">New</span>
              <span class="takeaway-type" id="newCount">0</span>
            </div>
          </div>

          <div class="takeaway-order">
            <div class="takeaway-header">
              <span class="takeaway-number" id="preparingLabel">Preparing</span>
              <span class="takeaway-type" id="preparingCount">0</span>
            </div>
          </div>

          <div class="takeaway-order">
            <div class="takeaway-header">
              <span class="takeaway-number" id="readyLabel">Ready</span>
              <span class="takeaway-type" id="readyCount">0</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../js/logout.js"></script>
  <script type="module" src="./kitchen-name-live.js"></script>
  <script type="module" src="./kitchen-data.js"></script>
</body>
</html>
