<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню - Serve Software Restaurant</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/menu.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

</head>
<body>
    <!-- Header -->
    <header class="header navbar-wrapper">
        <div class="navbar">
            <nav>
                <div class="menu-toggle" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <ul>
                    <li><a href="../index.html" data-translate="nav.home">Начало</a></li>
                    <li><a href="menu.html" data-translate="nav.menu">Меню</a></li>
                    <li><a href="../index.html#about" data-translate="nav.about">За нас</a></li>
                    <li><a href="../index.html#contact" data-translate="nav.contact">Контакти</a></li>
                </ul>
            </nav>
            <div class="navbar-cart">
                <div class="order-icon" onclick="toggleOrderSummary()">
                    <img src="../images/shopping-cart.png" alt="Shopping Cart">
                    <span class="order-badge" id="order-count">0</span>
                </div>
                <div class="receipt-icon" id="receipt-icon" onclick="showLastOrderReceipt()" style="display: none;" title="Последна поръчка / Last Order">
                    📄
                </div>
            </div>
        </div>
    </header>

    <!-- Menu Section -->
    <main class="menu-main">
        <div class="digital-menu-board">
            <div class="menu-row top-row" id="topRow"></div>
            <div class="menu-row bottom-row" id="bottomRow"></div>
          </div>          
    </main>

    <!-- Order Summary Modal -->
    <div id="orderSummaryModal" class="order-summary-modal">
        <div class="order-summary-content">
            <span class="order-close" onclick="toggleOrderSummary()">&times;</span>
            <h2 data-translate="order.title">Вашата поръчка</h2>
            <div id="order-items" class="order-items">
                <p class="empty-order" data-translate="order.empty">Няма добавени ястия</p>
            </div>
            <div class="order-total">
                <h3><span data-translate="order.total">Общо</span>: <span id="total-price">0.00</span> €</h3>
            </div>
            <button class="generate-qr-btn" onclick="generateQR()" data-translate="order.generateQR">Генерирай QR код</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-grid">
            <div>
                <h4>Serve Software</h4>
                <ul>
                    <li data-translate="footer.privacy">Поверителност</li>
                    <li data-translate="footer.services">Услуги</li>
                    <li data-translate="footer.about">За нас</li>
                </ul>
            </div>
            <div>
                <h4 data-translate="footer.quickLinks">Бързи връзки</h4>
                <ul>
                    <li data-translate="footer.menu">Меню</li>
                    <li data-translate="footer.story">Нашата история</li>
                    <li data-translate="footer.reservations">Резервации</li>
                </ul>
            </div>
            <div>
                <h4 data-translate="footer.social">Социални мрежи</h4>
                <div class="socials">
                    <span>🌐</span>
                    <span>📸</span>
                    <span>🐦</span>
                </div>
            </div>
        </div>
    </footer>
    <script src="../script.js"></script>
    <script src="./app.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/category.js"></script>
    <script src="../js/cookie-consent.js"></script>
</body>
</html>
