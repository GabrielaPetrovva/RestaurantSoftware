<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./WaiterDashboard/style.css">
</head>
<body class="payment-body">
  <main class="payment-page">
    <section class="payment-shell">
      <button id="backToDashboard" class="payment-back" type="button">&larr; Back</button>

      <div class="payment-card payment-page-card">
        <h1 id="paymentTitle">Payment</h1>
        <p id="paymentSubtitle">Secure payment page</p>

        <div id="paymentSummary" class="payment-page-summary"></div>

        <div id="cardSection" class="payment-provider-panel" hidden>
          <p id="cardPaymentText" class="payment-copy">You will be redirected to secure Stripe Checkout.</p>
          <button id="startCardCheckout" class="primary-payment-btn" type="button">
            Continue to card payment
          </button>
        </div>

        <div id="revolutSection" class="payment-provider-panel" hidden>
          <p id="revolutPaymentText" class="payment-copy">You will be redirected to Revolut Checkout.</p>
          <button id="startRevolutCheckout" class="primary-payment-btn" type="button">
            Continue to Revolut
          </button>
          <a id="revolutCheckoutLink" class="payment-link" hidden target="_blank" rel="noopener">
            Open Revolut checkout
          </a>
        </div>

        <div id="bankTransferSection" class="payment-provider-panel" hidden>
          <p id="bankTransferText" class="payment-copy">Generate a reference and make the transfer from your bank app.</p>
          <div id="bankInstructions" class="bank-transfer-box"></div>
          <button id="createBankTransfer" class="primary-payment-btn" type="button">
            Generate bank transfer reference
          </button>
          <button id="checkBankStatus" class="secondary-payment-btn" type="button">
            Check transfer status
          </button>
        </div>

        <button id="checkPaymentStatus" class="secondary-payment-btn" type="button">
          Check payment status
        </button>

        <div id="paymentStatus" class="payment-page-status" role="status" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script src="./WaiterDashboard/config.js"></script>
  <script type="module" src="./WaiterDashboard/payment.js"></script>
</body>
</html>
